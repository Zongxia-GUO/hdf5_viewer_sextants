# Continuous Integration: run the test suite and report lint/type status.
#
# Strategy:
#   - The `test` job is a hard gate: pytest must pass for the build to be green.
#   - The `lint` job (flake8 + mypy) is advisory for now (continue-on-error),
#     because the codebase currently carries a large pre-existing backlog
#     (hundreds of flake8/mypy findings). It surfaces the signal without
#     blocking PRs. Once the backlog is paid down, drop `continue-on-error`
#     to make it a hard gate.
name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      # Run Qt without a display server (conftest also sets this defensively).
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system libraries for headless Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_dev.txt

      - name: Run tests
        run: pytest -q

  lint:
    name: Lint & type-check (advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements_dev.txt

      - name: flake8
        continue-on-error: true
        run: flake8 .

      - name: mypy
        continue-on-error: true
        run: mypy src main.py
